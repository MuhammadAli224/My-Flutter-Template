name: flutter_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Core
  dartz: ^0.10.1
  gap: ^3.0.1
  jiffy: ^6.4.4
  flutter_dotenv:
  logger:

  # Networking
  connectivity_plus: ^7.1.1
  dio: ^5.9.2

  # State Management
  bloc: ^9.2.0
  equatable:
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^11.0.0

  # Dependency Injection
  get_it: ^9.2.1

  # Storage and Security
  flutter_secure_storage: ^10.1.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # Models and Code Generation Annotations
  auto_mappr_annotation: ^2.3.0
  freezed_annotation:
  json_annotation:

  # Routing
  go_router: ^17.2.3

  # UI
  auto_size_text:
  flutter_carousel_widget:
  flutter_screenutil: ^5.9.3
  lottie: ^3.3.3
  shimmer:

  # Files and Images
  cached_network_image_plus:
  image_picker: ^1.2.2
  path:
  path_provider: ^2.1.5
  # pretty_qr_code:

  # Localization
  easy_localization: ^3.0.8

  # Notifications
  awesome_notifications: ^0.11.0
  onesignal_flutter: ^5.5.4

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  # Code Generation
  auto_mappr: ^2.15.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  hive_ce_generator: ^1.11.1
  json_serializable: ^6.13.2

  # Flutter Tooling
  flutter_lints:
  flutter_native_splash:

  #  flutter pub run build_runner build --delete-conflicting-outputs
  #  flutter pub run build_runner watch --delete-conflicting-outputs
  #  dart run easy_localization:generate -S assets/translations -f keys -o app_strings.g.dart


flutter:
  uses-material-design: true
  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai/Almarai-Regular.ttf
        - asset: assets/fonts/Almarai/Almarai-Bold.ttf

  assets:
    - assets/
    - assets/fonts/
    - assets/fonts/Almarai/
    - assets/images/
    - assets/lottie/
    - assets/translations/

    - .env
